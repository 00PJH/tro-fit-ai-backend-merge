<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tro-Fit Auth Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --secondary: #ec4899;
            --background: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-focus: #a78bfa;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, rgba(0, 0, 0, 0) 40%),
                        radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.12) 0%, rgba(0, 0, 0, 0) 50%),
                        var(--background);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        /* Glass Container */
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* Title Area */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Auth Tabs */
        .tabs {
            display: flex;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 0.25rem;
            margin-bottom: 2rem;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.75rem;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        /* Form styling */
        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            padding: 0.85rem 1rem;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
            background: linear-gradient(135deg, #9b6cff 0%, #6d28d9 100%);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Dashboard (Logged In State) */
        .dashboard {
            display: none;
        }

        .welcome-card {
            text-align: center;
            margin-bottom: 2rem;
        }

        .welcome-card h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .profile-item {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .profile-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .profile-value.highlight {
            color: #f472b6;
        }

        .logout-btn {
            width: 100%;
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 0.9rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--error);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: rgba(30, 41, 59, 0.9);
            border-left: 4px solid var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 280px;
            transform: translateX(120%);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            backdrop-filter: blur(8px);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left-color: var(--success);
        }

        .toast.error {
            border-left-color: var(--error);
        }

        .toast-icon {
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animated-form {
            animation: fadeIn 0.4s ease forwards;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <!-- Auth Section -->
        <div id="auth-section">
            <div class="header">
                <h1>Tro-Fit Portal</h1>
                <p>FastAPI 기반 회원 인증 테스트</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">로그인</button>
                <button class="tab-btn" onclick="switchTab('signup')">회원가입</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="animated-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-id">아이디 (User ID)</label>
                    <input type="text" id="login-id" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="login-password">비밀번호</label>
                    <input type="password" id="login-password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="submit-btn">로그인</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="animated-form hidden" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="signup-id">아이디 (User ID)</label>
                    <input type="text" id="signup-id" placeholder="영문/숫자 조합" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">비밀번호</label>
                    <input type="password" id="signup-password" placeholder="비밀번호 설정" required>
                </div>
                <div class="form-group">
                    <label for="signup-email">이메일 (Email)</label>
                    <input type="email" id="signup-email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="signup-name">이름 (Name)</label>
                    <input type="text" id="signup-name" placeholder="실명을 입력하세요" required>
                </div>
                <div class="form-group">
                    <div class="input-row">
                        <div>
                            <label for="signup-age">나이 (Age)</label>
                            <input type="number" id="signup-age" placeholder="세" min="1" max="150" required>
                        </div>
                        <div>
                            <label for="signup-height">키 (Height)</label>
                            <input type="number" id="signup-height" placeholder="cm" step="0.1" min="30" max="300" required>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="signup-weight">몸무게 (Weight)</label>
                    <input type="number" id="signup-weight" placeholder="kg" step="0.1" min="10" max="500" required>
                </div>
                <button type="submit" class="submit-btn">회원가입 하기</button>
            </form>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="dashboard animated-form">
            <div class="welcome-card">
                <h2 id="welcome-message">반갑습니다, 회원님!</h2>
                <p style="color: var(--text-muted);">회원 정보 대시보드</p>
            </div>

            <div class="profile-grid">
                <div class="profile-item">
                    <span class="profile-label">아이디 (ID)</span>
                    <span class="profile-value" id="prof-id">-</span>
                </div>
                <div class="profile-item">
                    <span class="profile-label">이메일</span>
                    <span class="profile-value" id="prof-email">-</span>
                </div>
                <div class="profile-item">
                    <span class="profile-label">이름</span>
                    <span class="profile-value" id="prof-name">-</span>
                </div>
                <div class="profile-item">
                    <span class="profile-label">나이</span>
                    <span class="profile-value" id="prof-age">-</span>
                </div>
                <div class="profile-item">
                    <span class="profile-label">키</span>
                    <span class="profile-value highlight" id="prof-height">-</span>
                </div>
                <div class="profile-item">
                    <span class="profile-label">몸무게</span>
                    <span class="profile-value highlight" id="prof-weight">-</span>
                </div>
            </div>

            <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // Tab switching logic
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab-btn');
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');

            if (tab === 'login') {
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
            } else {
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
            }
        }

        // Toast notifications
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? '✓' : '✗';
            toast.innerHTML = `<span class="toast-icon">${icon}</span> <span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);
            
            // Remove after 3.5s
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        // Check authentication state on page load
        window.addEventListener('DOMContentLoaded', checkAuthStatus);

        async function checkAuthStatus() {
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    showAuth();
                    return;
                }
                
                const response = await fetch('/api/v1/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const user = await response.json();
                    showDashboard(user);
                } else {
                    localStorage.removeItem('access_token');
                    showAuth();
                }
            } catch (err) {
                console.error('인증 상태 확인 에러:', err);
                showAuth();
            }
        }

        function showDashboard(user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            
            document.getElementById('welcome-message').innerText = `반갑습니다, ${user.user_name}님!`;
            document.getElementById('prof-id').innerText = user.user_id;
            document.getElementById('prof-email').innerText = user.user_email;
            document.getElementById('prof-name').innerText = user.user_name;
            document.getElementById('prof-age').innerText = `${user.user_age}세`;
            document.getElementById('prof-height').innerText = `${user.user_height} cm`;
            document.getElementById('prof-weight').innerText = `${user.user_weight} kg`;
        }

        function showAuth() {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('dashboard-section').classList.add('hidden');
        }

        // Handle Signup Submission
        async function handleSignup(e) {
            e.preventDefault();
            
            const payload = {
                user_id: document.getElementById('signup-id').value.trim(),
                user_password: document.getElementById('signup-password').value,
                user_email: document.getElementById('signup-email').value.trim(),
                user_name: document.getElementById('signup-name').value.trim(),
                user_age: parseInt(document.getElementById('signup-age').value),
                user_height: parseFloat(document.getElementById('signup-height').value),
                user_weight: parseFloat(document.getElementById('signup-weight').value)
            };

            try {
                const response = await fetch('/api/v1/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                if (response.ok) {
                    showToast('회원가입이 완료되었습니다. 로그인해주세요!', 'success');
                    e.target.reset();
                    switchTab('login');
                } else {
                    showToast(data.detail || '회원가입에 실패했습니다.', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('네트워크 오류가 발생했습니다.', 'error');
            }
        }

        // Handle Login Submission
        async function handleLogin(e) {
            e.preventDefault();

            const payload = {
                user_id: document.getElementById('login-id').value.trim(),
                user_password: document.getElementById('login-password').value
            };

            try {
                const response = await fetch('/api/v1/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('성공적으로 로그인되었습니다.', 'success');
                    // Store token in localStorage
                    localStorage.setItem('access_token', data.access_token);
                    e.target.reset();
                    // Load user data
                    checkAuthStatus();
                } else {
                    showToast(data.detail || '로그인에 실패했습니다.', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('네트워크 오류가 발생했습니다.', 'error');
            }
        }

        // Handle Logout
        async function handleLogout() {
            try {
                const token = localStorage.getItem('access_token');
                const response = await fetch('/api/v1/logout', {
                    method: 'POST',
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });

                if (response.ok) {
                    localStorage.removeItem('access_token');
                    showToast('로그아웃 되었습니다.', 'success');
                    showAuth();
                } else {
                    showToast('로그아웃 처리 중 에러가 발생했습니다.', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('네트워크 오류가 발생했습니다.', 'error');
            }
        }
    </script>
</body>
</html>
